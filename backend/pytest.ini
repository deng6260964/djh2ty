[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 禁用 lifespan 中的数据库初始化（测试环境不依赖 PostgreSQL）
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
log_cli = false
log_level = WARNING
